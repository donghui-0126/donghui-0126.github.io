<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Donghui Lim — Crypto Quant Researcher & HFT Systems</title>
<meta name="description" content="Donghui Lim (amuredo) — Crypto Quant Researcher & HFT Systems Engineer based in Seoul. Pure-Rust OMS, market microstructure, LLM-driven research." />
<meta property="og:title" content="Donghui Lim — Crypto Quant Researcher & HFT Systems" />
<meta property="og:description" content="Pure-Rust OMS · tick-to-trade p50 4.23µs · market microstructure · LLM-driven research." />
<meta property="og:type" content="website" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
:root{
  --bg:#ffffff; --bg-soft:#f7f8fa; --panel:#ffffff;
  --text:#1f2328; --muted:#5e6873; --dim:#8b949e;
  --border:#e3e7ec; --border-2:#d3d9e0;
  --accent:#4263eb; --accent-soft:#edf0fe;
  --green:#2f9e44; --red:#e03131; --amber:#e8a317; --violet:#7048e8;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',sans-serif;
  --maxw:760px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text); font-family:var(--sans);
  line-height:1.7; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  word-break:keep-all; overflow-wrap:break-word; letter-spacing:-.1px; font-size:15.5px;
}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

/* nav */
nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
nav .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
.brand{font-weight:700;font-size:15px;letter-spacing:-.3px}
.brand .at{color:var(--dim);font-weight:500}
.navlinks{display:flex;gap:20px;font-size:13.5px}
.navlinks a{color:var(--muted);transition:color .15s}
.navlinks a:hover{color:var(--text)}
.navlinks a.gh{color:var(--accent)}
@media(max-width:640px){.navlinks a span.t{display:none}}

/* profile */
.profile{padding:54px 0 26px}
.phead{display:flex;align-items:center;gap:20px}
.avatar{width:84px;height:84px;border-radius:50%;border:1px solid var(--border);background:var(--bg-soft);flex:0 0 auto;object-fit:cover}
.pname{font-size:25px;font-weight:800;letter-spacing:-.6px}
.pname .kr{font-size:16px;color:var(--muted);font-weight:600;margin-left:8px}
.phandle{font-family:var(--mono);font-size:13px;color:var(--accent);margin-top:2px}
.pbio{margin-top:16px;color:var(--muted);font-size:15px}
.pbio b{color:var(--text);font-weight:600}
.plinks{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.plink{font-size:13px;font-family:var(--mono);padding:7px 13px;border:1px solid var(--border-2);border-radius:8px;color:var(--text);transition:.15s;background:var(--panel)}
.plink:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.plink.solid{background:var(--text);color:#fff;border-color:var(--text)}
.plink.solid:hover{background:#000;color:#fff}

/* generic section */
section{padding:30px 0}
.sec-h{display:flex;align-items:center;gap:9px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-h .emo{font-size:18px}
.sec-h h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.sec-h .ct{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:auto}

/* research interests */
.tags{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:12.5px;font-family:var(--mono);color:var(--muted);background:var(--bg-soft);border:1px solid var(--border);border-radius:20px;padding:5px 12px}
.chip:hover{border-color:var(--border-2);color:var(--text)}

/* project cards */
.projects{display:flex;flex-direction:column;gap:14px}
.proj{display:block;border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:20px 22px;transition:.18s}
.proj:hover{border-color:var(--border-2);box-shadow:0 8px 30px -16px rgba(20,30,50,.18);transform:translateY(-1px)}
.proj-meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-bottom:7px}
.proj-meta .yr{color:var(--muted)}
.badge{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--border-2);color:var(--muted)}
.badge.feat{color:var(--amber);border-color:#f0d9a8;background:#fdf6e7}
.badge.live{color:var(--green);border-color:#bfe6c8;background:#eef9f0}
.badge.priv{color:var(--dim)}
.proj-title{font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.proj:hover .proj-title{color:var(--accent)}
.proj-desc{color:var(--muted);font-size:14.5px;margin-top:8px}
.proj-desc b{color:var(--text);font-weight:600}
.metrics{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.metric{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-soft);border:1px solid #d7defb;border-radius:6px;padding:3px 9px}
.metric.g{color:var(--green);background:#eef9f0;border-color:#cdead3}
.stack{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.t{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:2px 8px}
.plinks-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:13px;font-family:var(--mono);font-size:12.5px}
.plinks-row a{color:var(--accent)}
.plinks-row a:hover{text-decoration:underline}

/* detail breakdown inside a card */
.bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
@media(max-width:640px){.bd-grid{grid-template-columns:1fr}}
.bd{border:1px solid var(--border);border-radius:9px;background:var(--bg-soft);padding:11px 13px}
.bd h5{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.bd h5 .n{font-family:var(--mono);color:var(--accent);margin-right:5px;font-size:11px}
.bd ul{list-style:none}
.bd li{font-size:12px;color:var(--muted);padding:2px 0 2px 12px;position:relative;line-height:1.5}
.bd li::before{content:"–";position:absolute;left:0;color:var(--dim)}
.bd li b{color:var(--text);font-weight:600}
.bd code,.proj-desc code{font-family:var(--mono);font-size:11px;color:var(--violet);background:#f2effb;padding:1px 5px;border-radius:4px}
.sub{font-size:12.5px;font-weight:700;color:var(--text);margin:16px 0 8px}

/* archive */
.arch{display:flex;flex-wrap:wrap;gap:8px}
.achip{font-family:var(--mono);font-size:12px;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 11px;background:var(--panel);transition:.15s}
.achip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.achip span{color:var(--dim)}
.achip:hover span{color:var(--accent)}

/* journey timeline */
.journey{position:relative;padding-left:26px;margin-top:4px}
.journey::before{content:"";position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--border-2)}
.jnode{position:relative;margin-bottom:14px}
.jnode:last-child{margin-bottom:0}
.jnode::before{content:"";position:absolute;left:-26px;top:6px;width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid var(--border-2);z-index:1}
.jnode.cur::before{border-color:var(--accent);background:var(--accent)}
.jcard{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:13px 16px;transition:.15s}
.jcard:hover{border-color:var(--border-2)}
.jyear{font-family:var(--mono);font-size:11.5px;color:var(--accent);margin-bottom:2px}
.jhead{font-size:15px;font-weight:700;margin-bottom:7px;letter-spacing:-.2px}
.jp{font-size:13px;margin:4px 0;color:var(--muted);line-height:1.55}
.jp .lab{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:1px 7px;border-radius:5px;margin-right:7px;vertical-align:1px}
.jp.prob .lab{color:var(--red);border:1px solid #f3c2c2}
.jp.sol .lab{color:var(--green);border:1px solid #bfe6c8}
.jp.now .lab{color:var(--accent);border:1px solid #c3cdfb}
.jp b{color:var(--text);font-weight:600}
.jp code{font-family:var(--mono);font-size:11px;color:var(--violet)}
.jopt{font-size:12px;color:var(--muted);padding:2px 0 2px 14px;position:relative;line-height:1.5}
.jopt::before{content:"▹";position:absolute;left:0;color:var(--accent);font-size:10px}
.jopt code{font-family:var(--mono);font-size:10.5px;color:var(--violet)}
.jopt b{color:var(--text);font-weight:600}
.jtags{margin-top:9px;font-family:var(--mono);font-size:10.5px;color:var(--dim)}

/* troubleshooting / engineering log */
.ts-intro{color:var(--muted);font-size:14px;margin-bottom:20px}
.ts-intro b{color:var(--text);font-weight:600}
.ts-list{display:flex;flex-direction:column;gap:13px}
.ts{border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:17px 20px;transition:.18s}
.ts:hover{border-color:var(--border-2);box-shadow:0 8px 30px -16px rgba(20,30,50,.18)}
.ts-h{display:flex;align-items:baseline;gap:9px;margin-bottom:10px;flex-wrap:wrap}
.ts-h .n{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600}
.ts-h .tt{font-size:15.5px;font-weight:700;letter-spacing:-.2px}
.ts-h .en{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
.ts .jp{font-size:13px;margin:5px 0}
.ts .jp.res .lab{color:var(--violet);border:1px solid #d3c8f5}
.ts .metrics{margin-top:11px}

/* awards */
.aw{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.aw:last-child{border-bottom:none}
.aw .y{font-family:var(--mono);font-size:12px;color:var(--dim);flex:0 0 46px}
.aw .c{font-size:14px;font-weight:600}
.aw .r{font-size:12.5px;color:var(--amber);font-weight:600}
.exp{font-size:13.5px;color:var(--muted);padding:5px 0}
.exp b{color:var(--text);font-weight:600}
.pub{border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 15px;background:var(--bg-soft);font-size:13px;color:var(--muted);margin-bottom:14px}
.pub b{color:var(--text)}

footer{border-top:1px solid var(--border);margin-top:30px;padding:22px 0;text-align:center;font-family:var(--mono);font-size:12px;color:var(--dim)}

.reveal{opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease}
.reveal.in{opacity:1;transform:none}

/* ============ markdown-rendered prose (scoped — does not touch card HTML) ============ */
#content>h1{font-size:25px;font-weight:800;letter-spacing:-.6px;margin:34px 0 6px}
#content>h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin:44px 0 18px;padding-bottom:10px;border-bottom:1px solid var(--border);scroll-margin-top:70px}
#content>h2:first-child{margin-top:8px}
#content>h3{font-size:14.5px;font-weight:700;margin:20px 0 8px}
#content>p{color:var(--muted);font-size:15px;margin:11px 0;line-height:1.7}
#content>ul,#content>ol{margin:11px 0;padding:0 0 0 2px;list-style:none}
#content>ul>li,#content>ol>li{position:relative;padding:3px 0 3px 16px;color:var(--muted);font-size:14.5px;line-height:1.6}
#content>ul>li::before{content:"–";position:absolute;left:0;color:var(--dim)}
#content>ol{counter-reset:li}
#content>ol>li::before{content:counter(li)".";counter-increment:li;position:absolute;left:0;color:var(--dim);font-family:var(--mono);font-size:12px}
#content>table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13.5px}
#content>table th,#content>table td{text-align:left;padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:top}
#content>table th{color:var(--text);font-weight:700;font-size:12.5px}
#content>table td{color:var(--muted)}
#content>hr{border:none;border-top:1px solid var(--border);margin:30px 0}
#content>blockquote{border-left:3px solid var(--accent);background:var(--bg-soft);padding:10px 15px;margin:14px 0;border-radius:0 8px 8px 0}
#content>blockquote p{margin:0;font-size:13.5px;color:var(--muted)}
#content>p b,#content>ul>li b,#content>ol>li b,#content>table b,#content>p strong,#content>ul>li strong,#content>ol>li strong,#content>table strong,#content>blockquote b,#content>blockquote strong{color:var(--text);font-weight:600}
#content>p a,#content>ul>li a,#content>ol>li a,#content>table a,#content>blockquote a{color:var(--accent)}
#content>p a:hover,#content>ul>li a:hover,#content>ol>li a:hover,#content>table a:hover,#content>blockquote a:hover{text-decoration:underline}
#content>p code,#content>ul>li code,#content>ol>li code,#content>table code,#content>blockquote code{font-family:var(--mono);font-size:12px;color:var(--violet);background:#f2effb;padding:1px 5px;border-radius:4px}
#content .loading{color:var(--dim);font-family:var(--mono);font-size:13px;padding:40px 0}
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="brand">Donghui Lim <span class="at">· @donghui-0126</span></div>
    <div class="navlinks">
      <a href="#journey">🧭<span class="t"> Journey</span></a>
      <a href="#projects">🗂️<span class="t"> Projects</span></a>
      <a href="#engineering">🛠️<span class="t"> Engineering</span></a>
      <a href="#awards">🏅<span class="t"> Awards</span></a>
      <a class="gh" href="https://github.com/donghui-0126" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
  </div>
</nav>

<main id="content" class="wrap"><p class="loading">불러오는 중…</p></main>

<footer>
  <div class="wrap">© 2026 Donghui Lim · 임동휘 &nbsp;·&nbsp; lukedonghui@gmail.com</div>
</footer>

<!-- content is authored in content.md and rendered at runtime (no build step) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(async function(){
  const el=document.getElementById('content');
  try{
    const res=await fetch('content.md?'+Date.now());           // cache-bust so commits reflect immediately
    if(!res.ok) throw new Error('content.md '+res.status);
    const md=await res.text();
    marked.setOptions({gfm:true,breaks:false});
    el.innerHTML=marked.parse(md);
  }catch(e){
    el.innerHTML='<p style="color:var(--red);font-family:var(--mono);font-size:13px;padding:30px 0">'
      +'콘텐츠를 불러오지 못했습니다: '+e.message+'</p>';
    return;
  }
  // reveal-on-scroll for any .reveal blocks in the rendered content
  const obs=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target);} });
  },{threshold:.08});
  document.querySelectorAll('.reveal').forEach(x=>obs.observe(x));
})();
</script>
</body>
</html>
